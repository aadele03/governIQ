:root{color-scheme:light;
  --bg:#F5F4EF;--card:#ffffff;--ink:#17181C;--muted:#5C616B;--line:#E7E6DF;--soft:#EFEEE7;--gray:#9CA0A8;
  --g1:#788C5D;--g2:#8DA06B;--y:#C9A86B;--o:#D97757;--r:#BC4B33;
  --accent:#C0552F;--accent2:#3E6E99;--green:#788C5D;
  /* executive redesign tokens */
  --accent-soft:#F7ECE5;--accent-line:#ECD9CE;--slate:#1B1D22;--slate2:#2A2D34;--ink2:#3A3D45;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --sh-1:0 1px 2px rgba(16,16,20,.04),0 1px 3px rgba(16,16,20,.05);
  --sh-2:0 6px 20px rgba(16,16,20,.08),0 2px 6px rgba(16,16,20,.05);
  --ring:0 0 0 3px rgba(192,85,47,.30);
  --pos:#5E7D46;--neu:#B98A2E;--neg:#BC4B33;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Source Sans Pro",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;}
.app{display:flex;min-height:100vh;}
/* sidebar */
.side{width:236px;flex:0 0 236px;background:#141413;color:#FAF9F5;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{font-size:15px;font-weight:700;letter-spacing:-.2px;padding:0 8px 4px;}
.brand small{display:block;font-weight:400;font-size:11px;color:var(--gray);margin-top:3px;}
.nav{margin-top:16px;display:flex;flex-direction:column;gap:3px;}
.nav button{display:flex;gap:10px;align-items:center;text-align:left;border:0;background:transparent;color:#d7d5cc;padding:9px 10px;border-radius:9px;font-size:13px;cursor:pointer;width:100%;}
.nav button .num{flex:0 0 22px;height:22px;border-radius:6px;background:#2b2a27;color:var(--gray);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.nav button:hover{background:#232220;color:#fff;}
.nav button.active{background:var(--accent);color:#fff;}
.nav button.active .num{background:rgba(255,255,255,.25);color:#fff;}
.statesel{width:100%;margin:12px 0 2px;padding:9px 10px;border-radius:9px;border:1px solid #34322e;background:#232220;color:#FAF9F5;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.statesel option{background:#232220;color:#FAF9F5;}
.main{flex:1;min-width:0;padding:26px 28px 60px;}
.mhead{margin:0 0 2px;font-size:22px;letter-spacing:-.3px;color:#141413;}
.msub{color:var(--muted);font-size:13px;margin:0 0 18px;}
section.mod{display:none;}
section.mod.active{display:block;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px;box-shadow:0 1px 3px rgba(20,20,19,.04);}
.panel h3{margin:0 0 4px;font-size:15px;}
.panel .ph{color:var(--muted);font-size:12.5px;margin:0 0 12px;}
.iag{display:flex;flex-direction:column;gap:10px;}
.iag-card{border:1px solid var(--line);border-radius:var(--r-md);padding:12px 14px;background:var(--card);box-shadow:var(--sh-1);}
.iag-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--soft);}
.iag-name{font-weight:700;font-size:15px;color:var(--ink);line-height:1.25;}
.iag-mood{flex:0 0 auto;font-size:15px;white-space:nowrap;}
.iag-body{display:flex;flex-wrap:wrap;gap:14px;}
.iag-chg{flex:1 1 240px;min-width:0;}
.iag-lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);margin-bottom:3px;}
.iag-delta{font-weight:700;font-size:14px;margin-bottom:3px;}
.iag-why{font-size:12px;line-height:1.5;color:var(--muted);}
.grid{display:grid;gap:16px;}

/* ==================================================================
   EXECUTIVE REDESIGN LAYER  (overrides earlier rules; appended last)
   Refined GovernIQ — warm accent + calm slate, government-grade
   ================================================================== */
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{background:var(--bg);color:var(--ink);font-size:14px;letter-spacing:-.05px;}

/* ---- layout & rhythm ---- */
.main{max-width:1320px;margin:0 auto;padding:30px 34px 72px;}
.grid{gap:18px;}
.panel{border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 22px;margin-top:18px;box-shadow:var(--sh-1);}
.panel h3{font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--ink);margin:0 0 3px;}

/* ---- typography / module headers ---- */
.mhead{font-size:26px;font-weight:700;letter-spacing:-.6px;color:var(--ink);line-height:1.15;margin:0 0 4px;}
.msub{font-size:14px;color:var(--muted);max-width:none;margin:0 0 22px;line-height:1.5;}
h3{font-size:13px;letter-spacing:.2px;}
.lab{font-size:11px;letter-spacing:.6px;color:var(--muted);font-weight:700;text-transform:uppercase;}
.sub{font-size:12.5px;color:var(--muted);}

/* ---- sidebar ---- */
.side{width:248px;flex:0 0 248px;background:linear-gradient(180deg,var(--slate),#14161A);
  border-right:1px solid rgba(255,255,255,.06);padding:22px 14px;}
.brand{font-size:15px;font-weight:700;letter-spacing:-.2px;padding:0 8px 6px;color:#FBFAF6;}
.brand small{color:#9A9EA8;}
.nav{margin-top:10px;gap:2px;}
.navsec{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:#7E828C;padding:16px 12px 6px;}
.navsec:first-child{padding-top:6px;}
.nav button{gap:11px;padding:9px 11px;border-radius:10px;font-size:13.5px;font-weight:500;color:#C7CAD1;
  transition:background .15s,color .15s,box-shadow .15s;position:relative;}
.nav button .ic{display:inline-flex;width:18px;height:18px;opacity:.85;flex:0 0 18px;}
.nav button .ic svg{width:18px;height:18px;}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav button.active{background:rgba(192,85,47,.16);color:#fff;font-weight:600;box-shadow:inset 3px 0 0 var(--accent);}
.nav button.active .ic{opacity:1;color:#E8916B;}
.nav button:focus-visible{outline:2px solid #fff;outline-offset:-2px;}
.statesel{margin:14px 0 4px;padding:10px 11px;border-radius:10px;border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);color:#FBFAF6;font-weight:600;}
.statesel:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}

/* ---- cards ---- */
.card{border:1px solid var(--line);border-left:1px solid var(--line);border-radius:var(--r-lg);
  padding:18px;box-shadow:var(--sh-1);transition:box-shadow .18s,border-color .18s;}
.card:hover{box-shadow:var(--sh-2);}
.grid.g2 .card,.grid.g3 .card{border-left-width:4px;}  /* keep colored accent bar where issue cards set border-left-color */

/* ---- KPI / stat blocks ---- */
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh-1);}
.stat .big{font-size:32px;font-weight:700;letter-spacing:-.8px;margin-top:8px;}
.stat.lead,.lead{background:linear-gradient(140deg,#1B1D22,#33373F);color:#FBFAF6;border:0;box-shadow:var(--sh-2);}
.stat.lead .lab,.lead .lab{color:#B9BDC6;}
.stat.lead .big,.lead .big{font-size:46px;letter-spacing:-1.4px;}
.stat.lead .sub,.lead .sub{color:#CFD2D9;}
.big.nm{font-size:22px;letter-spacing:-.4px;}

/* ---- refreshed status bar (was heavy dark) ---- */
.refbar{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:var(--r-md);
  padding:11px 16px;font-size:13px;box-shadow:var(--sh-1);margin-bottom:18px;gap:8px;}
.refbar b{font-weight:700;color:var(--ink);}
.rdot{background:var(--pos);box-shadow:0 0 0 3px rgba(94,125,70,.18);}

/* ---- change chips ---- */
.chg{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;}
.chg.up{color:var(--pos);background:rgba(94,125,70,.10);}
.chg.down{color:var(--neg);background:rgba(188,75,51,.10);}
.chg.flat{color:var(--muted);background:var(--soft);}
.moverline{padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.moverline:last-child{border-bottom:0;}

/* ---- badges / pills ---- */
.badge{border-radius:7px;padding:3px 9px;font-size:10.5px;font-weight:700;letter-spacing:.3px;}

/* ---- chips / filters ---- */
.chips{gap:8px;margin-bottom:16px;}
.chip,.chips button{border:1px solid var(--line);background:var(--card);color:var(--ink2);

.chip:hover,.chips button:hover{border-color:var(--accent-line);background:var(--accent-soft);color:var(--accent);}

/* ---- tables ---- */
table.tb{font-size:13px;}
table.tb thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  font-weight:700;border-bottom:1.5px solid var(--line);padding:9px 10px;background:transparent;}
table.tb tbody td{padding:10px 10px;border-bottom:1px solid var(--line);}
table.tb tbody tr{transition:background .12s;}
table.tb tbody tr:hover{background:var(--accent-soft);}
th.sortable{cursor:pointer;}th.sortable:hover{color:var(--accent);}

/* ---- buttons (action, not nav) ---- */
.btn,#qaBtn{width:auto;display:inline-flex;justify-content:center;background:var(--accent);color:#fff;
  border:0;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:700;cursor:pointer;
  box-shadow:var(--sh-1);transition:filter .15s,box-shadow .15s;}
.btn:hover,#qaBtn:hover{filter:brightness(1.06);box-shadow:var(--sh-2);}
.btn.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line);}
#qaInput{border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:14px;}
#qaInput:focus-visible{outline:none;border-color:var(--accent);box-shadow:var(--ring);}

/* ---- charts ---- */
.spark{height:62px;}
.m1spark{height:170px;}

/* ---- scale legend ---- */
.scalestrip{gap:10px 16px;margin-top:16px;font-size:11.5px;}
.dot{border-radius:4px;}

/* ---- accessibility: focus ---- */
a:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}

/* ---- polished UX states ---- */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  text-align:center;padding:42px 20px;color:var(--muted);border:1px dashed var(--line);

.empty .et{font-size:15px;font-weight:700;color:var(--ink);}
.empty .es{font-size:13px;max-width:46ch;}
.skeleton{position:relative;overflow:hidden;background:var(--soft);border-radius:8px;min-height:14px;}
.skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);

.events{font-size:12.5px;color:var(--ink2);}

.actf{display:flex;flex-direction:column;gap:3px;}

function gc(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function moodColor(s){if(s<4.0)return gc('--r');if(s<5.0)return gc('--o');if(s<7.0)return gc('--y');if(s<9.0)return gc('--g2');return gc('--g1');}
function moodLabel(s){if(s<4.0)return"Distressed";if(s<5.0)return"Frustrated";if(s<7.0)return"Mixed";if(s<9.0)return"Mostly positive";return"Satisfied";}
const sgn=x=>(x>0?"+":"")+x.toFixed(1);
function evIdx(q){var m=/(\d{4})\s*Q([1-4])/.exec(q);if(m)return (+m[1]-2020)*4+(+m[2]-1);var ys=(""+q).match(/\d{4}/g);if(ys){var y=+ys[ys.length-1];return (y-2020)*4+2;}return 99;}
const arrow=d=>d>0.1?"▲":(d<-0.1?"▼":"▬");
function moodChip(v){return '<span class="dotnum"><i class="ddot" style="background:'+moodColor(v)+'"></i>'+v.toFixed(1)+'</span>';}
const cls=d=>d>0.1?"up":(d<-0.1?"down":"flat");

function spark(cv,labels,data,color,ymin,ymax){const c=new Chart(cv,{type:'line',data:{labels,datasets:[{data,borderColor:color,backgroundColor:color,tension:.3,borderWidth:2.4,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{title:c=>labels[c[0].dataIndex],label:c=>'Mood '+(+c.parsed.y).toFixed(1)+' / 10'}}},scales:{y:{min:ymin==null?1:ymin,max:ymax==null?10:ymax,display:false},x:{display:false}}}});charts.push(c);return c;}

const RESP={
 "Traffic":{agency:"Ministry of Transportation & Traffic Management Authority",msg:"Traffic officers are being deployed to the worst corridors and signal timing and BRT frequency reviewed; phased improvements and updates will follow this quarter."},
 "Roads":{agency:"Ministry of Works & Infrastructure",msg:"Repair crews are being scheduled for the most-cited roads; the rehabilitation list and timelines will be published."},

 "Waste":{agency:"State Waste Management Authority (Ministry of Environment)",msg:"Collection schedules are being restored and backlog black-spots cleared; a fixed per-area pickup calendar will be published."},
 "Cost of living":{agency:"Ministry of Commerce, Trade & Industry / Economic Planning",msg:"Food-relief and market-stabilisation measures are being expanded and transporters engaged to ease fares; further interventions are under review."},
 "Security":{agency:"Ministry of Home Affairs & State Security/Safety Corps",msg:"Security agencies have been directed to step up patrols in affected areas; community reporting channels remain open."},
 "Healthcare":{agency:"Ministry of Health & Primary Healthcare Board",msg:"Staffing, supplies and disease surveillance are being reinforced at health centres in affected areas."},
 "Education":{agency:"Ministry of Education / SUBEB",msg:"The flagged gaps in schools are being addressed; an update on staffing and facilities will be provided."},
 "Housing":{agency:"Ministry of Housing & Urban Development",msg:"Rent and tenancy concerns are under review and affordable-housing and regularisation measures are being accelerated."},
 "Markets":{agency:"Ministry of Commerce & Market Development Board",msg:"Market leaders are being engaged on the concerns raised; levies, safety and trading conditions are under review."},
 "Electricity / Power":{agency:"Ministry of Energy & Rural Electrification Board",msg:"Supply faults are being escalated with the DisCo/TCN and alternative-power projects pursued for affected communities."},
 "Governance & taxation":{agency:"Office of the SSG & State Internal Revenue Service",msg:"The levy and service concerns raised are under review; transparency and engagement on the issue will be improved."}
};
function canonIssue(label){const s=String(label||"").toLowerCase();
 if(s.includes("electric")||s.includes("power"))return "Electricity / Power";
 if(s.includes("cost")||s.includes("living"))return "Cost of living";
 if(s.includes("govern")||s.includes("tax"))return "Governance & taxation";
 const names=["Traffic","Roads","Flooding","Waste","Security","Healthcare","Education","Housing","Markets"];
 for(const n of names){if(s===n.toLowerCase())return n;}
 return label;}
const RESP_FED={"Fuel & PMS":{agency:"NNPC Ltd / NMDPRA",msg:"PMS pricing templates and supply data are being published, with CNG rollout accelerated to ease pump costs."},"Naira, FX & jobs":{agency:"Central Bank of Nigeria / Federal Ministry of Finance",msg:"FX and reserves data are being published and credit and skills programmes scaled to support jobs."},"Cost of living":{agency:"Federal Ministry of Finance / Ministry of Agriculture / CBN",msg:"Food-logistics measures and targeted transfers are being deployed to ease household costs."},"Electricity / Power":{agency:"Federal Ministry of Power / NERC / TCN",msg:"Grid-reliability and metering work is being prioritised and Band A tariff disputes addressed."},"Security":{agency:"Office of the NSA / Nigeria Police Force / Armed Forces",msg:"Multi-agency operations continue and the state-police framework is being advanced with oversight."},"Roads & infrastructure":{agency:"Federal Ministry of Works / FERMA",msg:"Federal road commissionings and a completion tracker are being published."},"Healthcare":{agency:"Federal Ministry of Health / NHIA",msg:"Health-worker retention measures and NHIA enrolment are being accelerated."},"Education":{agency:"Federal Ministry of Education / NELFUND / TETFund",msg:"Student-loan disbursement and school-safety measures are being strengthened."},"Governance & taxation":{agency:"Office of the SGF / FIRS / the Presidency",msg:"Tax-reform communication and revenue-transparency measures are being prioritised."}};
function respOf(label){var _fed=(typeof STATE!=="undefined"&&STATE==="federal");var _m=_fed?RESP_FED:RESP;return _m[canonIssue(label)]||(_fed?{agency:"Office of the Secretary to the Government of the Federation",msg:"This issue is under federal review; measures and timelines will be communicated shortly."}:{agency:"Office of the Secretary to the State Government",msg:"We are reviewing citizen feedback on this issue and will share an update shortly."});}
function recOf(label){const c=canonIssue(label);const a=((typeof ACTIONS!=='undefined'&&ACTIONS)||[]).find(x=>canonIssue(x.issue)===c);return a?{prio:a.prio,rec:a.rec}:null;}
function prioFromV(v){return v>=80?"Critical":v>=68?"High":v>=55?"Medium":"Low";}
function pcolor(p){return p==="Critical"?gc('--r'):p==="High"?gc('--o'):p==="Medium"?gc('--y'):gc('--g1');}
function escalateFlag(prio,v){return (prio==="Critical"||v>=82)?"Yes — brief the Chief of Staff":"No — monitor at agency level";}
function actionCard(o){return `<div class="actcard">
  <div class="acth"><span class="actt">${o.title}</span><span class="prio" style="background:${pcolor(o.prio)}">${o.prio}</span></div>
  <div class="actf"><span class="actl">Responsible agency</span><span class="actv">${o.agency}</span></div>
  <div class="actf"><span class="actl">Recommended response</span><span class="actv">${o.rec}</span></div>

function m13(){
 const el=document.getElementById('mod13');
 el.innerHTML=H('Methodology &amp; Sources','GovernIQ tracks citizen mood across ten states (Lagos, Oyo, Ogun, Rivers, Kano, FCT, Akwa Ibom, Enugu, Anambra, Imo). It explains where the data comes from, how the mood index works, and which numbers are sourced versus modeled. Figures below reflect the state selected in the sidebar ('+CFG.state+').')+
  `<div class="grid g4">
    <div class="stat lead"><div class="lab">Coverage</div><div class="big">10 states</div><div class="sub">${ISSUES.length} issues tracked in ${CFG.state}</div></div>
    <div class="stat"><div class="lab">Time span</div><div class="big">2020–2026</div><div class="sub">26 quarters (Q1 ’20–Q2 ’26)</div></div>
    <div class="stat"><div class="lab">Mood scale</div><div class="big">1–10</div><div class="sub">distressed → satisfied</div></div>
    <div class="stat"><div class="lab">Refresh</div><div class="big">Daily</div><div class="sub">current snapshot · history quarterly</div></div>
   </div>
   <div class="panel"><h3>Where the data comes from</h3>
     <p class="lead-para">Mood is read from public discussion across four channel types: <b>Nairaland</b> (Nigeria’s largest forum), <b>Nigerian news outlets</b> — general (Punch, Premium Times, Vanguard, The Guardian, ThisDay, The Nation, Daily Trust, Leadership, Tribune Online/Nigerian Tribune, The Sun, Daily Independent, Blueprint, New Telegraph, TheCable, PM News, Daily Post, Ripples Nigeria, Sahara Reporters) and business &amp; financial (BusinessDay, Nairametrics, Proshare, MarketForces Africa, Investors King, Economic Confidential, MoneyCentral, Financial Nigeria), and <b>public reaction on X/Twitter and Facebook</b> where reporting captured it, plus <b>public YouTube comments</b> — pulled via the YouTube Data API from recent Nigerian news and government videos, relevance-checked to the specific state and issue (off-target videos are discarded), weighted by likes, then classified by issue and aggregated to the issue level (no per-channel scoring; raw comments are not retained). For each state we also draw on its local outlets — Ibadan, Abeokuta, Port Harcourt, Kano, Abuja, Uyo, Enugu, Awka/Onitsha and Owerri press — alongside the national dailies.</p>
     <ul class="exlist" style="margin-top:10px">
       <li><b>Skew:</b> online voices lean younger, urban, male and more vocal, so the picture tilts toward grievances; YouTube adds a diaspora and big-channel tilt, which is why its comments are relevance-checked and blended, never taken alone. Treat it as directional sentiment, <b>not a representative survey</b>.</li>
       <li><b>Spam &amp; bots:</b> YouTube comments are scrubbed on collection — links, promos, phone numbers, one-word filler and duplicate copy-pasted posts are dropped, and no single account can flood a topic — then weighted by likes so low-effort bot posts barely register, with the daily read discarding any that slip through.</li>
     </ul>
   </div>
   
   <div class="panel"><h3>The mood index (1–10)</h3>
     <p class="ph">A qualitative score capturing how ${CFG.demonym} feel about each issue, from the balance and tone of complaints versus praise.</p>
     <div class="scalekey">
       <span><i class="dot" style="background:var(--r)"></i><b>1.0–3.9</b> Distressed — sustained anger / crisis</span>
       <span><i class="dot" style="background:var(--o)"></i><b>4.0–4.9</b> Frustrated</span>
       <span><i class="dot" style="background:var(--y)"></i><b>5.0–6.9</b> Mixed</span>
       <span><i class="dot" style="background:var(--g2)"></i><b>7.0–8.9</b> Mostly positive</span>
       <span><i class="dot" style="background:var(--g1)"></i><b>9.0–10.0</b> Satisfied</span>
     </div>
   </div>
   <div class="panel"><h3>What’s sourced vs modeled</h3><p class="ph">Every element, its basis, and how much to trust it. ‘Modeled’ = analyst estimate; ‘Sourced’ = tied to reported events; ‘Derived/Statistical’ = computed from the data.</p>
     <table class="tb tbw"><thead><tr><th>Element</th><th>Basis</th><th>Type</th></tr></thead><tbody>
     ${BASIS.map(x=>`<tr><td data-label="Element"><b>${x.e}</b></td><td style="font-size:12.5px;color:var(--muted)" data-label="Basis">${x.b}</td><td data-label="Type"><span class="prio" style="background:${TCOL[x.t]||gc('--gray')}">${x.t}</span></td></tr>`).join("")}
     </tbody></table>
   </div>
   <div class="panel"><h3>Limitations</h3>
     <ul class="exlist">
       <li>Not a probability survey — it reflects who posts publicly, not the whole population.</li>
       <li>Complaint, anger and project numbers are <b>modeled estimates</b>, best used for direction and prioritisation, not precise measurement.</li>
       <li>Forecasts are pattern-based, not predictions of specific events.</li>
       <li>Sentiment can be moved by a few loud voices or viral moments; corroborate big calls with the underlying modules and sources.</li>
     </ul>
   </div>
   <footer><b>In short.</b> GovernIQ turns public discussion into a consistent, trackable read of citizen mood. It is strongest as an early-warning and prioritisation tool; for high-stakes decisions, pair it with official data and on-the-ground verification.</footer>`;
}

he highway is moving. Here's our resettlement ledger and how affected families can verify and claim compensation."},{"name":"State-police framework","trust":5.6,"status":"Legislating","note":"Constitutional amendment passed the National Assembly; awaits state ratification, assent and funding design.","src":{"t":"Daily Post","u":"https://dailypost.ng/2026/06/26/state-police-nigerians-divided-as-national-assembly-passes-historic-bill/"},"response":"Move from headline to statute: publish a funded implementation roadmap with command, funding and oversight safeguards, and bring governors and civil society into a visible design process to defuse the 'tool for abuse' fear before ratification.","line":"State police means faster local response, with safeguards. Here's the design, the safeguards, and the timeline to delivery."},{"name":"Tax Reform Acts (2025)","trust":3.8,"status":"Enacted","note":"New tax laws signed to simplify the system and lift revenue; contested on equity, VAT-sharing and timing.","src":{"t":"Daily Post","u":"https://dailypost.ng/2025/12/23/nba-demands-probe-calls-for-suspension-of-controversial-tax-reform-acts/"},"response":"Lead with relief, not collection: communicate the exemptions and simplification first, publish where new revenue is spent, run a VAT-sharing explainer for sub-nationals, and engage on the most contested provisions rather than defending them as a bloc.","line":"The new tax laws lower the burden for most households. Here's what changes for you — and where the revenue goes."},{"name":"Subsidy removal & FX reform","trust":3.2,"status":"Painful","note":"Credited with restoring fiscal space but blamed for the cost-of-living crisis since 2023.","src":{"t":"Daily Post","u":"https://dailypost.ng/2026/06/15/nigerias-inflation-rate-rises-for-third-consecutive-month/"},"response":"Own the pain honestly and show the offset: pair every 'reform is working' message with relief residents can feel (transfers, transport, CNG), and publish a simple be
