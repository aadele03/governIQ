:root{color-scheme:light;
  --bg:#FAF9F5;--card:#ffffff;--ink:#141413;--muted:#6E6C64;--line:#E8E6DC;--soft:#E8E6DC;--gray:#B0AEA5;
  --g1:#788C5D;--g2:#8DA06B;--y:#C9A86B;--o:#D97757;--r:#BC4B33;
  --accent:#D97757;--accent2:#6A9BCC;--green:#788C5D;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Source Sans Pro",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;}
.app{display:flex;min-height:100vh;}
/* sidebar */
.side{width:236px;flex:0 0 236px;background:#141413;color:#FAF9F5;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{font-size:15px;font-weight:700;letter-spacing:-.2px;padding:0 8px 4px;}
.brand small{display:block;font-weight:400;font-size:11px;color:var(--gray);margin-top:3px;}
.nav{margin-top:16px;display:flex;flex-direction:column;gap:3px;}
.nav button{display:flex;gap:10px;align-items:center;text-align:left;border:0;background:transparent;color:#d7d5cc;padding:9px 10px;border-radius:9px;font-size:13px;cursor:pointer;width:100%;}
.nav button .num{flex:0 0 22px;height:22px;border-radius:6px;background:#2b2a27;color:var(--gray);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.nav button:hover{background:#232220;color:#fff;}
.nav button.active{background:var(--accent);color:#fff;}
.nav button.active .num{background:rgba(255,255,255,.25);color:#fff;}
.statesel{width:100%;margin:12px 0 2px;padding:9px 10px;border-radius:9px;border:1px solid #34322e;background:#232220;color:#FAF9F5;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.main{flex:1;min-width:0;padding:26px 28px 60px;}
.mhead{margin:0 0 2px;font-size:22px;letter-spacing:-.3px;color:#141413;}
.msub{color:var(--muted);font-size:13px;margin:0 0 18px;}
section.mod{display:none;}
section.mod.active{display:block;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px;box-shadow:0 1px 3px rgba(20,20,19,.04);}
.panel h3{margin:0 0 4px;font-size:15px;}
.panel .ph{color:var(--muted);font-size:12.5px;margin:0 0 12px;}
.grid{display:grid;gap:16px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:repeat(4,1fr);}
@media(max-width:1000px){.g3,.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:780px){
 .app{flex-direction:column;}
 .side{width:auto;flex:none;height:auto;position:sticky;top:0;z-index:10;padding:10px;}
 .nav{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:6px;}
 .nav button{white-space:nowrap;padding:7px 10px;}
 .nav button span.lbl{display:inline;font-size:12px;}
 .nav button .num{flex-basis:24px;}
 .g2{grid-template-columns:1fr;}
}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(20,20,19,.04);}
.stat .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
.stat .big{font-size:34px;font-weight:700;line-height:1.05;margin-top:6px;}
.stat .sub{font-size:12.5px;color:var(--muted);margin-top:4px;}
.stat.lead{background:linear-gradient(135deg,#141413,#2b2a27);color:#FAF9F5;border:0;}
.stat.lead .lab{color:var(--gray);}
.stat.lead .sub{color:#d7d5cc;}
.badge{font-size:11px;font-weight:700;color:#fff;border-radius:20px;padding:3px 9px;white-space:nowrap;display:inline-block;}
.pill{font-size:11px;font-weight:600;border-radius:20px;padding:2px 9px;background:var(--soft);color:#4a4943;display:inline-block;}
.chartbox{position:relative;height:430px;}

function gc(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function moodLabel(s){if(s<4.0)return"Distressed";if(s<5.0)return"Frustrated";if(s<7.0)return"Mixed";if(s<9.0)return"Mostly positive";return"Satisfied";}

 const down=[...ISSUES].sort((a,b)=>(cur(a)-prev(a))-(cur(b)-prev(b)))[0];
 // daily snapshots

 const vsY=yday?today.c-yday.c:null;

 let mover=null;
 if(yday){const mv=ISSUES.map(i=>({i,d:today.s[i.key]-yday.s[i.key]})).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d))[0];if(Math.abs(mv.d)>=0.01)mover=mv;}
 const vsYTxt=vsY!=null?`<span class="chg ${cls(vsY)}">${arrow(vsY)} ${sgn(vsY)} vs yesterday</span>`:`<span class="chg flat">first daily snapshot</span>`;
 const el=document.getElementById('mod1');
 el.innerHTML=H('Main Dashboard',CFG.state+'’s mood at a glance for '+CFG.asOfLong+' (latest quarter, '+CFG.curQuarter+').')+
  `<div class="refbar"><span class="rdot"></span> Last refreshed <b>${fmtHuman(CFG.lastRefresh)}</b> &nbsp;·&nbsp; State mood <b>${today.c.toFixed(1)}</b> / 10 &nbsp; ${vsYTxt}</div>
  <div class="grid g4">
    <div class="stat lead"><div class="lab">Current state-wide mood</div><div class="big">${city.toFixed(1)}<span style="font-size:16px;font-weight:400"> / 10</span></div><div class="sub">${moodLabel(city)} · ${vsY!=null?(arrow(vsY)+" "+sgn(vsY)+" vs yesterday"):(sgn(city-cityPrev)+" vs last quarter")}</div></div>
    <div class="stat"><div class="lab">Best issue now</div><div class="big nm" style="color:${moodColor(cur(best))}">${best.name}</div><div class="sub">${cur(best).toFixed(1)} / 10 · ${moodLabel(cur(best))}</div></div>
    <div class="stat"><div class="lab">Worst issue now</div><div class="big nm" style="color:${moodColor(cur(worst))}">${worst.name}</div><div class="sub">${cur(worst).toFixed(1)} / 10 · ${moodLabel(cur(worst))}</div></div>
    <div class="stat"><div class="lab">Biggest mover today</div><div class="big" style="font-size:22px">${mover?`${mover.i.name} <span style="font-size:15px" class="${cls(mover.d)}">${arrow(mover.d)} ${sgn(mover.d)}</span>`:"—"}</div><div class="sub">day-over-day change</div></div>
  </div>
  <div class="grid g2">
    <div class="panel"><h3>State-wide mood — daily</h3><p class="ph">Last 30 days · updates each midnight refresh.</p><div class="m1spark"><canvas id="m1daily"></canvas></div></div>
    <div class="panel"><h3>Quarterly movers</h3>
      <div class="moverline"><span class="up">▲ Most improved</span> &nbsp; <b>${up.name}</b> <span class="up">${sgn(cur(up)-prev(up))}</span> &nbsp;<span class="o">now ${cur(up).toFixed(1)} (was ${prev(up).toFixed(1)})</span></div>
      <div class="moverline"><span class="down">▼ Biggest decline</span> &nbsp; <b>${down.name}</b> <span class="down">${sgn(cur(down)-prev(down))}</span> &nbsp;<span class="o">now ${cur(down).toFixed(1)} (was ${prev(down).toFixed(1)})</span></div>
      <div class="scalestrip"><span class="lab">Mood scale</span><span><i class="dot" style="background:var(--r)"></i>1.0–3.9</span><span><i class="dot" style="background:var(--o)"></i>4.0–4.9</span><span><i class="dot" style="background:var(--y)"></i>5.0–6.9</span><span><i class="dot" style="background:var(--g2)"></i>7.0–8.9</span><span><i class="dot" style="background:var(--g1)"></i>9.0–10.0</span></div>
    </div>
  </div>
  <div class="panel" style="position:relative"><h3>All 12 issues, current standing</h3><div id="m1tip" class="maptip"></div>
   <table class="tb"><thead><tr>
     <th class="sortable" data-k="name">Issue<span class="sarr"></span></th>
     <th class="sortable r" data-k="now">Now<span class="sarr"></span></th>
     <th class="sortable" data-k="mood">Mood<span class="sarr"></span></th>
     <th class="sortable r" data-k="yday">vs yday<span class="sarr"></span></th>
     <th class="sortable r" data-k="mo3">vs 3 mo<span class="sarr"></span></th>
   </tr></thead><tbody id="m1tb"></tbody></table>
   <p class="ph" style="margin-top:8px">Click a column heading to sort (click again to reverse). Hover an issue name to see its definition.</p>
  </div>`;
 function m1rows(){const a=[...ISSUES],k=m1sort.key,d=m1sort.dir;
   a.sort((x,y)=>{if(k==='name')return d*x.name.localeCompare(y.name);
     let vx,vy;
     if(k==='yday'){vx=dIssue(x.key);vy=dIssue(y.key);vx=vx==null?-1e9:vx;vy=vy==null?-1e9:vy;}
     else if(k==='mo3'){vx=cur(x)-prev(x);vy=cur(y)-prev(y);}
     else{vx=cur(x);vy=cur(y);}
     return d*(vx-vy);});
   return a;}
 function m1fill(){
   document.getElementById('m1tb').innerHTML=m1rows().map(i=>{const dd=cur(i)-prev(i);const dy=dIssue(i.key);
     return `<tr><td><b class="idef" data-k="${i.key}" style="border-bottom:1px dotted #B0AEA5;cursor:default">${i.name}</b></td><td class="r">${moodChip(cur(i))}</td><td>${moodLabel(cur(i))}</td><td class="r ${dy!=null?cls(dy):'flat'}">${dy!=null?arrow(dy)+' '+sgn(dy):'—'}</td><td class="r ${cls(dd)}">${arrow(dd)} ${sgn(dd)}</td></tr>`;}).join("");
   el.querySelectorAll('th[data-k]').forEach(th=>{th.querySelector('.sarr').textContent=th.dataset.k===m1sort.key?(m1sort.dir>0?' ▲':' ▼'):'';});
    const _tip=document.getElementById('m1tip');el.querySelectorAll('.idef').forEach(node=>{node.addEventListener('mousemove',e=>{const r=_tip.parentElement.getBoundingClientRect();_tip.textContent=ISSUE_DEFS[node.dataset.k]||'';_tip.style.display='block';let x=e.clientX-r.left+14,y=e.clientY-r.top+14;if(x>r.width-250)x=r.width-260;if(x<6)x=6;_tip.style.left=x+'px';_tip.style.top=y+'px';});node.addEventListener('mouseleave',()=>{_tip.style.display='none';});});
 }
 el.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.k;if(m1sort.key===k)m1sort.dir*=-1;else{m1sort.key=k;m1sort.dir=1;}m1fill();}));
 m1fill();
 const D30=DAILY.slice(-30);const ser=D30.map(x=>x.c);let mn=Math.min(...ser),mx=Math.max(...ser);const pad=Math.max(0.05,(mx-mn)*0.35);mn=Math.max(1,mn-pad);mx=Math.min(10,mx+pad);
 spark(document.getElementById('m1daily'),D30.map(x=>fmtHuman(x.d)),ser,gc('--accent'),mn,mx);
}

 f.onchange=()=>{m3state.from=+f.value;if(m3state.from>m3state.to){m3state.to=m3state.from;t.value=m3state.to;}drawM3();};
 t.onchange=()=>{m3state.to=+t.value;if(m3state.to<m3state.from){m3state.from=m3state.to;f.value=m3state.from;}drawM3();};

function drawM3(){
 const lo=m3state.from,hi=m3state.to;const labels=Q_LABELS.slice(lo,hi+1);
 const head="<thead><tr><th class='topic sortable' data-s='name'>Issue<span class='sarr'></span></th>"+labels.map(function(l,j){return "<th class='sortable r' data-s='"+(lo+j)+"'>"+l+"<span class='sarr'></span></th>";}).join("")+"<th class='sortable r' data-s='net'>Net &#916;<span class='sarr'></span></th></tr></thead>";
 const arr=[...ISSUES];const k=m3sort.key,dr=m3sort.dir;
 arr.sort(function(a,b){if(k==='name')return dr*a.name.localeCompare(b.name);if(k==='net')return dr*((a.scores[hi]-a.scores[lo])-(b.scores[hi]-b.scores[lo]));if(k==='cur')return dr*(a.scores[LAST]-b.scores[LAST]);return dr*(a.scores[k]-b.scores[k]);});
 const rows=arr.map(function(i){var seg=i.scores.slice(lo,hi+1);var cells=seg.map(function(s){return '<td class="cell" style="background:'+moodColor(s)+'">'+s.toFixed(1)+'</td>';}).join("");var d=seg[seg.length-1]-seg[0];return '<tr><td class="topic">'+i.name+'</td>'+cells+'<td class="r '+cls(d)+'">'+arrow(d)+' '+sgn(d)+'</td></tr>';}).join("");
 var avgCells=labels.map(function(_,j){var pi=lo+j;var av=ISSUES.reduce(function(s,i){return s+i.scores[pi];},0)/ISSUES.length;return '<td class="cell" style="background:'+moodColor(av)+';border-top:2px solid #cfd6dc">'+av.toFixed(1)+'</td>';}).join("");
 var avL=ISSUES.reduce(function(s,i){return s+i.scores[lo];},0)/ISSUES.length,avH=ISSUES.reduce(function(s,i){return s+i.scores[hi];},0)/ISSUES.length,an=avH-avL;
 var avgRow="<tr><td class='topic' style='border-top:2px solid #cfd6dc;font-weight:700'>Average</td>"+avgCells+'<td class="r '+cls(an)+'" style="border-top:2px solid #cfd6dc">'+arrow(an)+' '+sgn(an)+'</td></tr>';
 var hd=document.getElementById('m3heat');hd.innerHTML=head+"<tbody>"+rows+avgRow+"</tbody>";
 hd.querySelectorAll('th[data-s]').forEach(function(th){var s=th.querySelector('.sarr');if(s)s.textContent=((''+m3sort.key)===th.dataset.s)?(m3sort.dir>0?' ▲':' ▼'):'';th.addEventListener('click',function(){var key=(th.dataset.s==='name'||th.dataset.s==='net')?th.dataset.s:(+th.dataset.s);if((''+m3sort.key)===(''+key))m3sort.dir*=-1;else{m3sort.key=key;m3sort.dir=1;}drawM3();});});
}

function m4(){
 const el=document.getElementById('mod4');
 const start=Math.max(0,Q_LABELS.indexOf("2024 Q3")); // last 2 years
 const winLabels=Q_LABELS.slice(start);
 const cur=i=>i.scores[LAST],prv=i=>i.scores[LAST-1],fst=i=>i.scores[start];
 el.innerHTML=H('Issue Trajectories','Each issue’s path over the past two years ('+Q_LABELS[start]+' → '+Q_LABELS[LAST]+') — latest score, change vs the previous quarter, and net change across the window. Each mini-trend is auto-scaled to its own range so the variance is visible. Events and sources are limited to the last two years.')+
  `<div class="grid g2" id="m4cards"></div>`;
 document.getElementById('m4cards').innerHTML=ISSUES.map(i=>{
  const c=cur(i),col=moodColor(c),mt=META[i.key];
  const q=c-prv(i),n=c-fst(i);

    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><h4>${i.name}</h4><span class="badge" style="background:${col}">${moodLabel(c)}</span></div>

    <div class="spark"><canvas id="m4-${i.key}"></canvas></div>

    <div class="srclist">${mt.sources.map(s=>`<a href="${s.u}" target="_blank" rel="noopener">→ ${s.t}</a>`).join("")}</div>
  </div>`;
 }).join("");
 ISSUES.forEach(i=>{const seg=i.scores.slice(start);let mn=Math.min(...seg),mx=Math.max(...seg);
   if(mx-mn<0.05){mn-=0.3;mx+=0.3;}else{const pad=(mx-mn)*0.30;mn-=pad;mx+=pad;}
   mn=Math.max(1,mn);mx=Math.min(10,mx);
   spark(document.getElementById('m4-'+i.key),winLabels,seg,i.color,mn,mx);});
}

function m10(){
 const el=document.getElementById('mod10');
 const cityMood=ISSUES.reduce((a,b)=>a+b.scores[LAST],0)/ISSUES.length;
 const pc={Critical:gc('--r'),High:gc('--o'),Medium:gc('--y'),Low:gc('--g1')};
 const pairs=[[1,2],[5,6],[9,10],[13,14],[17,18],[21,22]];
 const fcOf=i=>Math.max(1,Math.min(10,i.scores[LAST]+pairs.reduce((a,p)=>a+(i.scores[p[1]]-i.scores[p[0]]),0)/pairs.length));
 const riskOf=p=>p<2.0?["High",gc('--r')]:p<2.5?["Medium",gc('--o')]:["Low",gc('--g1')];
 const act={}; ACTIONS.forEach(a=>act[a.issue]=a);
 const rows=ISSUES.map(i=>{const cur=i.scores[LAST],fc=fcOf(i),a=act[i.name]||{prio:"Low",rec:"Monitor; no major intervention indicated."};return {i,cur,fc,a};})
   .sort((x,y)=>Math.min(x.cur,x.fc)-Math.min(y.cur,y.fc));
 const hi=rows.filter(r=>r.fc<2.0).length;
 const watch=[...rows].sort((a,b)=>a.fc-b.fc)[0];
 const critN=rows.filter(r=>r.a.prio==="Critical").length;
 const qidx=[[0,4,8,12,16,20,24],[1,5,9,13,17,21,25],[2,6,10,14,18,22],[3,7,11,15,19,23]];
 const seas=i=>qidx.map(ix=>{const v=ix.map(k=>i.scores[k]);return v.reduce((a,b)=>a+b,0)/v.length;});
 el.innerHTML=H('Risk &amp; Action Plan','Current severity, next-quarter forecast ('+CFG.nextQuarter+') and the recommended action for every issue in one view — most urgent first. Forecasts are pattern-based estimates, not event predictions.')+
  `<div class="grid g4">

    <div class="stat"><div class="lab">Top watch-item</div><div class="big nm" style="color:${moodColor(watch.fc)}">${watch.i.name}</div><div class="sub">${CFG.nextQuarter} forecast ${watch.fc.toFixed(1)}</div></div>
    <div class="stat"><div class="lab">Critical priorities</div><div class="big nm" style="color:${gc('--r')}">${critN}</div><div class="sub">need action now</div></div>
   </div>
   <div class="panel"><h3>Severity, forecast &amp; recommended action</h3><p class="ph">Sorted by urgency (worst now or imminent first). Forecast = next quarter, ${CFG.nextQuarter}.</p>
    <table class="tb"><thead><tr><th>Issue</th><th class="r">Now</th><th class="r">Forecast</th><th>Risk</th><th>Priority</th><th>Recommended action</th></tr></thead><tbody>
    ${rows.map(r=>{const rk=riskOf(r.fc);return `<tr>
      <td><b>${r.i.name}</b></td>
      <td class="r">${moodChip(r.cur)}</td>
      <td class="r">${moodChip(r.fc)}</td>
      <td><span class="prio" style="background:${rk[1]}">${rk[0]}</span></td>
      <td><span class="prio" style="background:${pc[r.a.prio]}">${r.a.prio}</span></td>
      <td style="font-size:12.5px">${r.a.rec}</td></tr>`;}).join("")}
    </tbody></table>
   </div>
   <div class="panel"><h3>Seasonal pattern — when each issue bites</h3><p class="ph">Average mood by calendar quarter, 2020–2026. Lower (darker) = the season that issue is typically worst — act ahead of it.</p>
    <div style="overflow-x:auto"><table class="heat"><tr><th class="topic">Issue</th><th>Q1 Jan–Mar</th><th>Q2 Apr–Jun</th><th>Q3 Jul–Sep</th><th>Q4 Oct–Dec</th><th>Worst</th></tr>

    </table></div>

}

/* ============ MODULE 11 — YOUR STRATEGIST ============ */
let QALOG=[];
const ASK_PROMPT="You are the analyst for GovernIQ, a Nigerian state citizen-mood platform (the `state` field names the state). Use ONLY the JSON dataset provided. It contains the FULL quarterly citizen-mood history from 2020 Q1 to the current quarter: each issue's `history` array lines up index-for-index with the `quarters` list, `cityMoodByQuarter` is the state-wide average per quarter, and `dailyRecent` holds the latest daily snapshots. Mood scale: 1=distressed to 10=satisfied. Use the FULL history for any trend, change-over-time, best/worst-period, seasonality or comparison question; use current values for 'now' questions. Answer with specific figures and a clear, well-reasoned recommendation. For budgeting or spending questions, name the specific LGA(s) and/or issue(s), justify with the data, and note trade-offs. Be concise — a few short paragraphs or bullets. Flag when something is a modeled estimate. Do not invent data beyond what is given.\n\nQuestion: ";
function buildCtx(){
 const cityMood=ISSUES.reduce((a,b)=>a+b.scores[LAST],0)/ISSUES.length;
 const issues=ISSUES.map(i=>({issue:i.name,current:+i.scores[LAST].toFixed(1),vsPrevQuarter:+(i.scores[LAST]-i.scores[LAST-1]).toFixed(1),history:i.scores.map(v=>+v.toFixed(1))}));
 const cityMoodByQuarter=Q_LABELS.map((_,qi)=>+(ISSUES.reduce((a,b)=>a+b.scores[qi],0)/ISSUES.length).toFixed(2));
 const lgas=LGAS.map(l=>({lga:l.n,mood:+Math.max(1,Math.min(10,cityMood+l.o)).toFixed(1),leadingIssue:l.t})).sort((a,b)=>a.mood-b.mood);
 const pairs=[[1,2],[5,6],[9,10],[13,14],[17,18],[21,22]];
 const forecast=ISSUES.map(i=>{const d=pairs.reduce((a,p)=>a+(i.scores[p[1]]-i.scores[p[0]]),0)/pairs.length;return {issue:i.name,forecastNextQuarter:+Math.max(1,Math.min(10,i.scores[LAST]+d)).toFixed(1)};}).sort((a,b)=>a.forecastNextQuarter-b.forecastNextQuarter);
 return {state:CFG.state,asOf:CFG.curQuarter+" ("+CFG.asOfLong+")",
  coverage:"Quarterly citizen-mood history from 2020 Q1 to "+CFG.curQuarter+", plus recent daily snapshots.",
  moodScale:"1=distressed, 2=frustrated, 3=mixed, 4=mostly positive, 5=satisfied",
  quarters:Q_LABELS,
  cityWideMood:+cityMood.toFixed(1),
  cityMoodByQuarter,
  issues,
  dailyRecent:DAILY.slice(-14).map(x=>({date:x.d,cityMood:x.c})),
  lgas_worstFirst:lgas,
  topComplaints_last3mo:COMPLAINTS.map(c=>({issue:c.issue,intensity_0to100:c.int,summary:c.t})),
  publicProjects:PROJECTS.map(p=>({project:p.name,trust:p.trust,status:p.status})),
  praisedActions_12mo:PRAISED.map(p=>({action:p.action,issue:p.issue})),
  riskForecast_nextQuarter:forecast.slice(0,6),
  recommendedActions:ACTIONS.map(a=>({issue:a.issue,priority:a.prio,recommendation:a.rec})),
  caveat:"LGA scores, complaint intensities and forecasts are modeled estimates from public discussion (Nairaland, Nigerian daily news, X/Facebook), not measured surveys."};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtA(s){let h=esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
 const lines=h.split(/\n/);let out='',ul=false;
 lines.forEach(ln=>{const m=ln.match(/^\s*[-*]\s+(.*)/);if(m){if(!ul){out+='<ul>';ul=true;}out+='<li>'+m[1]+'</li>';}else{if(ul){out+='</ul>';ul=false;}if(ln.trim())out+='<p>'+ln+'</p>';}});
 if(ul)out+='</ul>';return out||'<p>'+h+'</p>';}
function renderThread(){const t=document.getElementById('qaThread');if(!t)return;
 t.innerHTML=QALOG.map(e=>`<div class="qa-q">${esc(e.q)}</div><div class="qa-a">${e.a}</div>`).join("");t.scrollTop=t.scrollHeight;}
async function askData(){
 const inp=document.getElementById('qaInput');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';
 QALOG.push({q,a:'<span class="thinking">Thinking…</span>'});renderThread();const idx=QALOG.length-1;
 try{
   if(!(window.cowork&&window.cowork.askClaude)){QALOG[idx].a='<em>The Q&A assistant runs inside the Cowork live view. Open this as the live artifact (not the downloaded file) to ask questions.</em>';renderThread();return;}
   const res=await window.cowork.askClaude(ASK_PROMPT+q,[buildCtx()]);
   let txt=typeof res==='string'?res:((res&&res.content&&res.content[0]&&res.content[0].text)||(res&&res.text)||JSON.stringify(res));
   QALOG[idx].a=fmtA(txt);renderThread();
 }catch(err){QALOG[idx].a='<em>Sorry — could not generate an answer ('+esc(String((err&&err.message)||err))+').</em>';renderThread();}
}

 const chgWord=cityChg>0.1?("up "+sgn(cityChg)):cityChg<-0.1?("down "+sgn(cityChg)):"flat";

   <div class="panel"><h3>Where the data comes from</h3>
     <p class="lead-para">Mood is read from public discussion across three channel types: <b>Nairaland</b> (Nigeria’s largest forum), <b>Nigerian daily news</b> (Punch, Guardian, Vanguard, Premium Times, BusinessDay, Nairametrics, FIJ, TheCable, Blueprint, Daily Post and others), and <b>public reaction on X/Twitter and Facebook</b> where reporting captured it. For each state we also draw on its local outlets — Ibadan, Abeokuta, Port Harcourt, Kano and Abuja press — alongside the national dailies.</p>
     <ul class="exlist" style="margin-top:10px">
       <li><b>Skew:</b> online voices lean younger, urban, male and more vocal, so the picture tilts toward grievances. Treat it as directional sentiment, <b>not a representative survey</b>.</li>
